<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Schedule Availability Checker</title>
  
  <!-- LINK TO YOUR EXTERNAL CSS STYLE SHEET -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="api-card">
    <h2>Availability Lookup</h2>
    
    <div class="nav-controls">
      <button id="prev-btn" class="nav-btn">◀</button>
      <input type="date" id="date-picker">
      <button id="next-btn" class="nav-btn">▶</button>
    </div>

    <div class="config-controls">
      <label for="zh-row-input">Chinese Roster Start Row (ZH_ROW):</label>
      <input type="number" id="zh-row-input" value="39" min="1" max="200">
    </div>

    <div id="loading-overlay">⏳ Fetching Data...</div>

    <!-- ENGLISH TEAM DISPLAY DATA PLACEMENTS -->
    <div class="team-section">
      <div class="team-title">🇬🇧 English Instructors</div>
      <div class="roster-info">
        <div>Staff Present: <b id="en-staff">-</b></div>
        <div>Unassigned Rows: <b id="en-unassigned">-</b></div>
      </div>
      <div class="session-metrics">
        <div class="metric-box">
          <div>🌅 Morning Open</div>
          <div id="en-am" class="metric-num">-</div>
        </div>
        <div class="metric-box">
          <div>🌇 Afternoon Open</div>
          <div id="en-pm" class="metric-num">-</div>
        </div>
      </div>
    </div>

    <!-- CHINESE TEAM DISPLAY DATA PLACEMENTS -->
    <div class="team-section">
      <div class="team-title">🇨🇳 Chinese Instructors</div>
      <div class="roster-info">
        <div>Staff Present: <b id="zh-staff">-</b></div>
        <div>Unassigned Rows: <b id="zh-unassigned">-</b></div>
      </div>
      <div class="session-metrics">
        <div class="metric-box">
          <div>🌅 Morning Open</div>
          <div id="zh-am" class="metric-num">-</div>
        </div>
        <div class="metric-box">
          <div>🌇 Afternoon Open</div>
          <div id="zh-pm" class="metric-num">-</div>
        </div>
      </div>
    </div>

  </div>

  <!-- 🟢 LINK TO YOUR EXTERNAL JAVASCRIPT LOGIC FILE -->
  <script src="app.js"></script>
</body>
</html>
